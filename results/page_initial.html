function beforeBody() {
    document.documentElement?.classList.remove('no-js');
    const osDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const native = window.__nativeStorageEntries;
    const stored = (native && native.setting_kae) || localStorage.setting_kae;
    const isDark = stored === 'd' || (stored !== '-1' && osDark);
    document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
    document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
    try {
        const sidebarCollapsed =
            (native && native.duckaiSidebarCollapsed) || localStorage.getItem('duckaiSidebarCollapsed');
        if (sidebarCollapsed === 'true') {
            document.documentElement.dataset.sidebarCollapsed = '';
        }
    } catch (e) {}

    try {
        const params = new URLSearchParams(window.location.search);
        if (params.get('duckai') === '6') {
            document.documentElement.dataset.desktopElectron = '';

            document.documentElement.dataset.hideChatInputPlaceholder = '';

    width: 30%;
    height: 100%;
    margin-top: 4px;
    border-radius: 9999px; /* --ds-radius-full */
    background-color: var(--sk-action-bg);
}

/* Action buttons row inside input */
.sk-input-actions {
    height: 32px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    align-self: stretch;
}

.sk-input-actions-left {
    display: flex;
    align-items: center;
    gap: 6px;
}

.sk-action-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background-color: var(--sk-action-bg);
    flex-shrink: 0;
}

/* Disclaimer spacer — reserves vertical space below the input.
 * Matches .footerDisclaimer padding + approximate single-line text height. */
.sk-disclaimer-spacer {
    width: 100%;
    max-width: 938px; /* --duckai-chat-max-width */
    margin: auto;
    margin-bottom: 0;
    padding: 8px 56px; /* --ds-space-x02(8) --ds-space-x14(56) */
    min-height: 13px; /* ≈ one line of label text (12.3px) */
    box-sizing: border-box;
}

/* ModeEntryPoints spacer — hidden on desktop (matches mode-entry-points.module.css .container display:none) */
.sk-entry-points {
    display: none;
}

/* Mobile/tablet: input centered vertically (matches emptyStateContainer flex-grow:1 + justify-content:center) */
@media (max-width: 900px) {
    .loader {
        padding-right: 0; /* no layout padding-right on mobile */
    }
    .sk-empty-state {
        flex: 1; /* top spacer: pushes input toward vertical center */
    }
    .sk-input-area {
        max-width: 700px; /* --duckai-chat-max-width-mobile (footer max-width) */
        margin: 0 auto;
        padding: 0 12px; /* --ds-space-x03 = 12px (--duckai-chat-left/right-padding mobile) */
    }
    .sk-input {
        max-width: none; /* input fills the 700px footer area, not capped at 640px */
        min-height: 98px; /* mobile: x10(40) + x14(56) + 2px border = 98px */
    }
    .sk-entry-points {
        display: block;
        margin-top: 16px; /* --ds-space-x04 (matches ModeEntryPoints container margin-top) */
        height: 26px;
    }
    .sk-disclaimer-spacer {
        flex: 1; /* bottom spacer: balances top spacer to center the input */
        margin: 0;
        padding: 0;
        min-height: 0;
        max-width: none;
    }
}

/* ===== Breathing animation ===== */
.sk-sidebar-icon,
.sk-sidebar-title,
.sk-input {
    animation: skeleton-breath 2s ease-in-out infinite;
}

/* ===== Noscript message styles ===== */
.noscript-container {
    width: 100vw;
    height: 100vh;
    display: grid;
    place-content: center;
    padding: 16px;
    box-sizing: border-box;
    text-align: center;
}

.noscript-text {
    font-size: 16px;
    line-height: 1.4;
    color: #111;
}

/* Electron: hide sidebar header (behind window controls / traffic lights) */
[data-desktop-electron] .sk-sidebar-header {
    visibility: hidden;
}

/* Electron: make skeleton sidebar draggable (visibility:hidden on header blocks drag, so target parent) */
[data-desktop-electron] .sk-sidebar {
    -webkit-app-region: drag;
}

/* Electron: make skeleton toolbar draggable (mirrors React's electronDragRegion on top-toolbar) */
[data-desktop-electron] .sk-toolbar {
    -webkit-app-region: drag;
}

/* Hide the chat input skeleton when the native app provides its own input
 * (no web form will mount). Set pre-paint by inline.js so the input area
 * is never laid out and there's no flash. Targets .sk-input-area so the
 * input box AND the mobile entry-points strip collapse together; the
 * surrounding flex spacers keep the layout centered. */
[data-hide-chat-input-placeholder] .sk-input-area {
    display: none;
}

/* Hide loader when JS is disabled */
.no-js .loader {
    display: none;
}
