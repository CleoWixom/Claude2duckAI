name: Duck.ai Interaction

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to send to duck.ai'
        required: true
        default: 'Hello!'
      model:
        description: 'AI model'
        required: false
        default: 'claude'

jobs:
  interact:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Interact with Duck.ai
        env:
          INPUT_MESSAGE: ${{ github.event.inputs.message }}
        run: |
          cat > interact.js << 'JSEOF'
          const puppeteer = require('puppeteer-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          const fs = require('fs');

          puppeteer.use(StealthPlugin());

          async function main() {
            const message = process.env.INPUT_MESSAGE || 'Hello!';
            console.log('Message:', message);

            const browser = await puppeteer.launch({
              headless: true,
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-blink-features=AutomationControlled',
                '--window-size=1280,900'
              ]
            });

            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 900 });
            await page.setUserAgent('Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36');

            // Extra stealth: override navigator properties
            await page.evaluateOnNewDocument(() => {
              Object.defineProperty(navigator, 'webdriver', { get: () => undefined });
              Object.defineProperty(navigator, 'plugins', { get: () => [1, 2, 3, 4, 5] });
              Object.defineProperty(navigator, 'languages', { get: () => ['en-US', 'en'] });
            });

            fs.mkdirSync('results', { recursive: true });

            console.log('Loading duck.ai...');
            await page.goto('https://duck.ai/', { waitUntil: 'networkidle0', timeout: 40000 });
            await new Promise(r => setTimeout(r, 5000));
            console.log('Title:', await page.title());

            // Find and use textarea
            const textarea = await page.$('textarea[placeholder*="Ask"]');
            if (!textarea) {
              console.log('No textarea found!');
              fs.writeFileSync('results/latest.json', JSON.stringify({ status: 'no_textarea', response: await page.evaluate(() => document.body.innerText), timestamp: new Date().toISOString() }, null, 2));
              await browser.close();
              return;
            }

            // Human-like interaction: move mouse, pause, then click
            const box = await textarea.boundingBox();
            await page.mouse.move(box.x + box.width / 2, box.y + box.height / 2, { steps: 10 });
            await new Promise(r => setTimeout(r, 300 + Math.random() * 400));
            await textarea.click();
            await new Promise(r => setTimeout(r, 200 + Math.random() * 300));

            // Type with human-like delays
            for (const char of message) {
              await textarea.type(char, { delay: 50 + Math.random() * 100 });
            }
            await new Promise(r => setTimeout(r, 500 + Math.random() * 500));

            // Click the Ask/Submit button
            const askBtn = await page.$('button[type="submit"]');
            if (askBtn) {
              const btnBox = await askBtn.boundingBox();
              await page.mouse.move(btnBox.x + btnBox.width / 2, btnBox.y + btnBox.height / 2, { steps: 8 });
              await new Promise(r => setTimeout(r, 200));
              await askBtn.click();
              console.log('Clicked Ask button');
            } else {
              await page.keyboard.press('Enter');
              console.log('Pressed Enter');
            }

            // Wait and check for captcha or response
            await new Promise(r => setTimeout(r, 3000));

            let finalText = '';
            let hasCaptcha = false;
            for (let i = 0; i < 20; i++) {
              await new Promise(r => setTimeout(r, 2000));
              const bodyText = await page.evaluate(() => document.body.innerText);
              if (bodyText.toLowerCase().includes('captcha') || bodyText.toLowerCase().includes('select all squares') || bodyText.toLowerCase().includes('containing a duck')) {
                hasCaptcha = true;
                console.log('CAPTCHA detected at iteration', i);
                finalText = bodyText;
                break;
              }
              // Check if response is complete (no "Generating" text)
              if (!bodyText.includes('Generating response') && bodyText.includes(message) && bodyText.length > 200) {
                // Wait a bit more for stability
                await new Promise(r => setTimeout(r, 3000));
                finalText = await page.evaluate(() => document.body.innerText);
                console.log('Response received!');
                break;
              }
              finalText = bodyText;
              process.stdout.write(`[${i}]`);
            }
            console.log('');

            // Extract AI response from page
            let aiResponse = '';
            if (!hasCaptcha) {
              aiResponse = await page.evaluate((msg) => {
                // Find elements that contain assistant response (not the user message)
                const allText = document.body.innerText;
                // Find where user message ends and AI response begins
                const msgIndex = allText.indexOf(msg);
                if (msgIndex !== -1) {
                  return allText.slice(msgIndex + msg.length).trim();
                }
                return allText;
              }, message);
            }

            const result = {
              message,
              ai_response: aiResponse,
              full_page_text: finalText,
              has_captcha: hasCaptcha,
              timestamp: new Date().toISOString(),
              status: hasCaptcha ? 'captcha_blocked' : 'success'
            };
            fs.writeFileSync('results/latest.json', JSON.stringify(result, null, 2));
            console.log('Status:', result.status);
            console.log('AI Response:', aiResponse.slice(0, 500));

            await browser.close();
          }

          main().catch(e => {
            const fs = require('fs');
            fs.mkdirSync('results', { recursive: true });
            fs.writeFileSync('results/latest.json', JSON.stringify({ status: 'error', error: e.message, timestamp: new Date().toISOString() }, null, 2));
            console.error(e);
          });
          JSEOF
          node interact.js

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git commit -m "Stealth run $(date -u +%H:%M:%S)" || echo "Nothing to commit"
          git push
