name: Duck.ai Interaction

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to send to duck.ai'
        required: true
        default: 'Hello!'
      model:
        description: 'AI model'
        required: false
        default: 'claude'

jobs:
  interact:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Interact with Duck.ai
        env:
          INPUT_MESSAGE: ${{ github.event.inputs.message }}
        run: |
          cat > interact.js << 'JSEOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          async function waitForSelector(page, selector, timeout = 15000) {
            const start = Date.now();
            while (Date.now() - start < timeout) {
              const el = await page.$(selector);
              if (el) return el;
              await new Promise(r => setTimeout(r, 500));
            }
            return null;
          }

          async function main() {
            const message = process.env.INPUT_MESSAGE || 'Hello!';
            console.log('Message:', message);

            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage', '--window-size=1280,900']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 900 });
            await page.setUserAgent('Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36');

            console.log('Opening duck.ai...');
            await page.goto('https://duck.ai/', { waitUntil: 'networkidle0', timeout: 40000 });
            await new Promise(r => setTimeout(r, 5000));

            console.log('Title:', await page.title());

            // Debug: dump all interactive elements
            const inputs = await page.evaluate(() => {
              const all = document.querySelectorAll('textarea, input, [contenteditable], [role="textbox"]');
              return Array.from(all).map(el => ({
                tag: el.tagName,
                type: el.type,
                placeholder: el.placeholder,
                id: el.id,
                className: el.className.slice(0, 80),
                contenteditable: el.contentEditable,
                visible: el.offsetWidth > 0 && el.offsetHeight > 0
              }));
            });
            console.log('Input elements found:', JSON.stringify(inputs, null, 2));

            // Try to find the chat input
            let inputEl = null;

            // Try textarea first
            const textareas = await page.$$('textarea');
            for (const ta of textareas) {
              const visible = await ta.evaluate(el => el.offsetWidth > 0 && el.offsetHeight > 0);
              if (visible) { inputEl = ta; console.log('Found visible textarea'); break; }
            }

            // Try contenteditable
            if (!inputEl) {
              const editables = await page.$$('[contenteditable="true"]');
              for (const ed of editables) {
                const visible = await ed.evaluate(el => el.offsetWidth > 0 && el.offsetHeight > 0);
                if (visible) { inputEl = ed; console.log('Found contenteditable'); break; }
              }
            }

            // Try role=textbox
            if (!inputEl) {
              inputEl = await page.$('[role="textbox"]');
              if (inputEl) console.log('Found role=textbox');
            }

            fs.mkdirSync('results', { recursive: true });

            if (inputEl) {
              await inputEl.click();
              await new Promise(r => setTimeout(r, 500));
              await inputEl.type(message, { delay: 40 });
              console.log('Typed message. Sending...');
              await new Promise(r => setTimeout(r, 500));
              await page.keyboard.press('Enter');
              console.log('Sent! Waiting for response...');

              // Wait for response to appear and stabilize
              let lastBodyText = '';
              let stableCount = 0;
              let responseEl = null;

              for (let i = 0; i < 25; i++) {
                await new Promise(r => setTimeout(r, 2000));
                const bodyText = await page.evaluate(() => document.body.innerText);
                if (bodyText === lastBodyText && bodyText.length > 100) {
                  stableCount++;
                  if (stableCount >= 3) { console.log('Response stabilized'); break; }
                } else {
                  stableCount = 0;
                }
                lastBodyText = bodyText;
                process.stdout.write(`[${i}]`);
              }
              console.log('');

              // Extract just the AI response (last message in chat)
              const responseData = await page.evaluate(() => {
                // Try specific selectors for duck.ai
                const selectors = [
                  '[data-testid="message-bubble-assistant"]',
                  '[class*="assistant"]',
                  '[class*="AIMessage"]',
                  '[class*="ai-message"]',
                  '[class*="bot-message"]',
                  '.chat-message-ai',
                  '[role="article"]:last-child',
                  '[class*="Message"]:last-child',
                  '[class*="message"]:last-child'
                ];

                for (const sel of selectors) {
                  const els = document.querySelectorAll(sel);
                  if (els.length > 0) {
                    const last = els[els.length - 1];
                    const text = last.innerText.trim();
                    if (text.length > 20) return { selector: sel, text };
                  }
                }

                // Fallback: get all text after the user message
                return { selector: 'body', text: document.body.innerText };
              });

              console.log('RESPONSE:\n', responseData.text.slice(0, 1000));

              const result = {
                message,
                response: responseData.text,
                selector_used: responseData.selector,
                timestamp: new Date().toISOString(),
                status: 'success'
              };
              fs.writeFileSync('results/latest.json', JSON.stringify(result, null, 2));

            } else {
              console.log('ERROR: Could not find input element!');
              const pageText = await page.evaluate(() => document.body.innerText);
              const result = { message, response: pageText, status: 'no_input_found', timestamp: new Date().toISOString() };
              fs.writeFileSync('results/latest.json', JSON.stringify(result, null, 2));
            }

            await browser.close();
          }

          main().catch(e => {
            const fs = require('fs');
            fs.mkdirSync('results', { recursive: true });
            fs.writeFileSync('results/latest.json', JSON.stringify({ status: 'error', error: e.message, stack: e.stack, timestamp: new Date().toISOString() }, null, 2));
            console.error(e);
            process.exit(1);
          });
          JSEOF
          node interact.js

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git commit -m "Duck.ai result $(date -u +%H:%M:%S)" || echo "Nothing to commit"
          git push
