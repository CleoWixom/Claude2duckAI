name: Duck.ai Interaction

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to send to duck.ai'
        required: true
        default: 'Hello!'
      model:
        description: 'AI model'
        required: false
        default: 'claude'

jobs:
  interact:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Interact with Duck.ai
        env:
          INPUT_MESSAGE: ${{ github.event.inputs.message }}
        run: |
          cat > interact.js << 'JSEOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          async function main() {
            const message = process.env.INPUT_MESSAGE || 'What is 2+2?';
            console.log('Message:', message);

            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 900 });
            await page.setUserAgent('Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36');

            fs.mkdirSync('results', { recursive: true });

            // Step 1: Load page
            console.log('Loading duck.ai...');
            await page.goto('https://duck.ai/', { waitUntil: 'networkidle0', timeout: 40000 });
            await new Promise(r => setTimeout(r, 5000));
            console.log('Title:', await page.title());

            // Save initial HTML
            fs.writeFileSync('results/page_initial.html', await page.content());

            // Dump ALL elements info
            const elements = await page.evaluate(() => {
              const result = { forms: [], inputs: [], buttons: [], textareas: [], editables: [] };
              document.querySelectorAll('form').forEach(el => result.forms.push({ id: el.id, className: el.className.slice(0,60) }));
              document.querySelectorAll('input').forEach(el => result.inputs.push({ type: el.type, id: el.id, placeholder: el.placeholder, className: el.className.slice(0,60), visible: el.offsetWidth > 0 }));
              document.querySelectorAll('textarea').forEach(el => result.textareas.push({ id: el.id, placeholder: el.placeholder, className: el.className.slice(0,60), visible: el.offsetWidth > 0, rows: el.rows }));
              document.querySelectorAll('button').forEach(el => result.buttons.push({ text: el.innerText.slice(0,30), id: el.id, className: el.className.slice(0,60), visible: el.offsetWidth > 0, type: el.type }));
              document.querySelectorAll('[contenteditable="true"]').forEach(el => result.editables.push({ tag: el.tagName, id: el.id, className: el.className.slice(0,60), visible: el.offsetWidth > 0 }));
              return result;
            });
            fs.writeFileSync('results/elements.json', JSON.stringify(elements, null, 2));
            console.log('Elements found:', JSON.stringify(elements, null, 2));

            // Step 2: Try to type and send
            // Try textarea first
            const textarea = await page.$('textarea');
            let sent = false;
            if (textarea) {
              const vis = await textarea.evaluate(el => el.offsetWidth > 0);
              if (vis) {
                await textarea.click();
                await textarea.type(message, { delay: 50 });
                console.log('Typed in textarea');
                await new Promise(r => setTimeout(r, 500));
                // Try clicking Ask/Send button
                const askBtn = await page.$('button[type="submit"], button[aria-label*="send" i], button[aria-label*="ask" i]');
                if (askBtn) {
                  await askBtn.click();
                  console.log('Clicked submit button');
                } else {
                  await page.keyboard.press('Enter');
                  console.log('Pressed Enter');
                }
                sent = true;
              }
            }

            if (!sent) {
              // Try contenteditable
              const editable = await page.$('[contenteditable="true"]');
              if (editable) {
                await editable.click();
                await editable.type(message, { delay: 50 });
                await page.keyboard.press('Enter');
                sent = true;
                console.log('Typed in contenteditable');
              }
            }

            if (!sent) {
              console.log('Could not find input! Checking for forms/inputs...');
            }

            // Wait for response
            await new Promise(r => setTimeout(r, 3000));
            let prevText = '';
            for (let i = 0; i < 20; i++) {
              await new Promise(r => setTimeout(r, 2000));
              const text = await page.evaluate(() => document.body.innerText);
              if (text === prevText && text.length > 100) break;
              prevText = text;
              process.stdout.write('.');
            }
            console.log('');

            // Save final state
            fs.writeFileSync('results/page_final.html', await page.content());
            const finalText = await page.evaluate(() => document.body.innerText);
            const result = {
              message,
              response: finalText,
              sent,
              timestamp: new Date().toISOString(),
              status: 'done'
            };
            fs.writeFileSync('results/latest.json', JSON.stringify(result, null, 2));
            console.log('Final text (first 500):', finalText.slice(0, 500));

            await browser.close();
          }

          main().catch(e => {
            const fs = require('fs');
            fs.mkdirSync('results', { recursive: true });
            fs.writeFileSync('results/latest.json', JSON.stringify({ status: 'error', error: e.message, timestamp: new Date().toISOString() }, null, 2));
            console.error(e);
          });
          JSEOF
          node interact.js

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git commit -m "Debug run $(date -u +%H:%M:%S)" || echo "Nothing to commit"
          git push
