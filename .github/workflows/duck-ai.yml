name: Duck.ai Interaction

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to send to duck.ai'
        required: true
        default: 'Hello!'
      model:
        description: 'AI model (claude, gpt4o, llama, mistral)'
        required: false
        default: 'claude'

jobs:
  interact:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Interact with Duck.ai
        env:
          INPUT_MESSAGE: ${{ github.event.inputs.message }}
          INPUT_MODEL: ${{ github.event.inputs.model }}
        run: |
          cat > interact.js << 'JSEOF'
          const puppeteer = require('puppeteer');
          async function main() {
            const message = process.env.INPUT_MESSAGE || 'Hello!';
            const model = process.env.INPUT_MODEL || 'claude';
            console.log('Message:', message, '| Model:', model);
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 900 });
            await page.setUserAgent('Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36');
            console.log('Opening duck.ai...');
            await page.goto('https://duck.ai/', { waitUntil: 'networkidle2', timeout: 30000 });
            await new Promise(r => setTimeout(r, 4000));
            await page.screenshot({ path: 'loaded.png' });
            const html = await page.content();
            require('fs').writeFileSync('page.html', html);
            console.log('Page title:', await page.title());
            const textarea = await page.$('textarea');
            if (textarea) {
              await textarea.click();
              await textarea.type(message, { delay: 50 });
              await page.keyboard.press('Enter');
              console.log('Message sent! Waiting for response...');
              await new Promise(r => setTimeout(r, 8000));
              await page.screenshot({ path: 'response.png', fullPage: true });
              const text = await page.evaluate(() => document.body.innerText);
              require('fs').writeFileSync('response.txt', text);
              console.log('RESPONSE TEXT:\n', text.slice(0, 2000));
            } else {
              console.log('No textarea found. Page content saved.');
              const text = await page.evaluate(() => document.body.innerText);
              require('fs').writeFileSync('response.txt', text);
              console.log(text.slice(0, 1000));
            }
            await browser.close();
          }
          main().catch(e => { console.error(e); process.exit(1); });
          JSEOF
          node interact.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: duck-ai-results
          path: |
            response.txt
            response.png
            loaded.png
            page.html
          retention-days: 1
