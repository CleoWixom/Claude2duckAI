name: Duck.ai Interaction

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to send to duck.ai'
        required: true
        default: 'Hello!'
      model:
        description: 'AI model'
        required: false
        default: 'claude'

jobs:
  interact:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Interact with Duck.ai
        env:
          INPUT_MESSAGE: ${{ github.event.inputs.message }}
          INPUT_MODEL: ${{ github.event.inputs.model }}
        run: |
          cat > interact.js << 'JSEOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          async function main() {
            const message = process.env.INPUT_MESSAGE || 'Hello!';
            console.log('Message:', message);
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 900 });
            await page.setUserAgent('Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36');
            console.log('Opening duck.ai...');
            await page.goto('https://duck.ai/', { waitUntil: 'networkidle2', timeout: 30000 });
            await new Promise(r => setTimeout(r, 5000));
            console.log('Title:', await page.title());
            const textarea = await page.$('textarea');
            let responseText = '';
            if (textarea) {
              await textarea.click();
              await textarea.type(message, { delay: 50 });
              await page.keyboard.press('Enter');
              console.log('Message sent! Waiting for response...');
              await new Promise(r => setTimeout(r, 3000));
              let last = '';
              let stable = 0;
              for (let i = 0; i < 20; i++) {
                await new Promise(r => setTimeout(r, 2000));
                const cur = await page.evaluate(() => {
                  const els = document.querySelectorAll('[class*="message"], [class*="Message"], [class*="response"], article, [role="article"]');
                  return Array.from(els).map(e => e.innerText.trim()).filter(t => t.length > 0).join('\n---\n');
                });
                if (cur === last && cur.length > 10) { stable++; if (stable >= 2) break; }
                else stable = 0;
                last = cur;
                process.stdout.write('.');
              }
              console.log('');
              responseText = last || await page.evaluate(() => document.body.innerText);
            } else {
              console.log('No textarea found');
              responseText = await page.evaluate(() => document.body.innerText);
            }
            const result = {
              message: message,
              response: responseText,
              timestamp: new Date().toISOString(),
              status: 'success'
            };
            fs.mkdirSync('results', { recursive: true });
            fs.writeFileSync('results/latest.json', JSON.stringify(result, null, 2));
            fs.writeFileSync('results/latest.txt', 'Q: ' + message + '\n\nA: ' + responseText);
            console.log('Result saved. Response preview:', responseText.slice(0, 500));
            await browser.close();
          }
          main().catch(e => {
            const fs = require('fs');
            fs.mkdirSync('results', { recursive: true });
            fs.writeFileSync('results/latest.json', JSON.stringify({status:'error', error: e.message, timestamp: new Date().toISOString()}));
            console.error(e);
            process.exit(1);
          });
          JSEOF
          node interact.js

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git commit -m "Duck.ai result: $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "Nothing to commit"
          git push
